<!DOCTYPE html>
<html>
<head>
<title>Video Random Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.header{
padding:10px;
background:#222;
}

.video-area{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

video{
width:300px;
height:220px;
background:black;
border-radius:10px;
}

.chat{
width:400px;
height:200px;
margin:auto;
background:#222;
overflow:auto;
padding:10px;
margin-top:20px;
}

input{
width:250px;
padding:8px;
}

button{
padding:8px;
margin-left:5px;
}

</style>

</head>

<body>

<div class="header">
🎥 Random Video Chat | 👥 <span id="users">0</span>
</div>

<div class="video-area">
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
</div>

<div id="chat" class="chat"></div>

<div>
<input id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>
<button onclick="nextUser()">Next</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

const chat = document.getElementById("chat")

const localVideo = document.getElementById("localVideo")
const remoteVideo = document.getElementById("remoteVideo")

let localStream
let peer

async function startCamera(){

localStream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
})

localVideo.srcObject = localStream

}

startCamera()

function createPeer(){

peer = new RTCPeerConnection()

localStream.getTracks().forEach(track=>{
peer.addTrack(track,localStream)
})

peer.ontrack = e=>{
remoteVideo.srcObject = e.streams[0]
}

peer.onicecandidate = e=>{
if(e.candidate){
socket.emit("signal",{
candidate:e.candidate
})
}
}

}

socket.on("signal",async data=>{

if(data.offer){

createPeer()

await peer.setRemoteDescription(
new RTCSessionDescription(data.offer)
)

const answer = await peer.createAnswer()

await peer.setLocalDescription(answer)

socket.emit("signal",{answer})

}

if(data.answer){

await peer.setRemoteDescription(
new RTCSessionDescription(data.answer)
)

}

if(data.candidate){

try{
await peer.addIceCandidate(data.candidate)
}catch{}

}

})

socket.on("matched",async()=>{

createPeer()

const offer = await peer.createOffer()

await peer.setLocalDescription(offer)

socket.emit("signal",{offer})

addMessage("Connected to stranger")

})

function addMessage(msg){

let div=document.createElement("div")
div.innerText=msg
chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function sendMessage(){

let input=document.getElementById("message")

socket.emit("message",input.value)

addMessage("You: "+input.value)

input.value=""

}

socket.on("message",(msg)=>{

addMessage("Stranger: "+msg)

})

function nextUser(){

socket.emit("next")

addMessage("Connecting new stranger...")

}

socket.on("onlineUsers",(count)=>{

document.getElementById("users").innerText=count

})
new RTCPeerConnection({
iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]
})

</script>

</body>
</html>
