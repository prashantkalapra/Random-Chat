<!DOCTYPE html>
<html>
<head>

<title>Random Video Chat</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

#users{
color:#22c55e;
margin-bottom:20px;
}

#videos{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

video{
width:320px;
height:240px;
background:black;
border-radius:10px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

#messages{
width:60%;
margin:auto;
height:150px;
overflow:auto;
border:1px solid gray;
padding:10px;
margin-top:20px;
border-radius:8px;
}

input{
padding:10px;
width:50%;
border-radius:8px;
border:none;
}

</style>

</head>

<body>

<h1>Random Chat</h1>

<div id="users">Live Users: 0</div>

<button onclick="startText()">Text Chat</button>
<button onclick="startVideo()">Video Chat</button>
<button onclick="nextUser()">Next</button>

<div id="videos">

<video id="localVideo" autoplay muted playsinline></video>
<video id="remoteVideo" autoplay playsinline></video>

</div>

<div id="messages"></div>

<br>

<input id="messageInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
