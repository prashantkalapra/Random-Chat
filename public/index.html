<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Text Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #060910;
    --surface: #0d1117;
    --surface2: #131920;
    --border: #1e2d3d;
    --accent: #00d4ff;
    --accent2: #00ff9d;
    --text: #e2eaf4;
    --muted: #4a6070;
    --glow: 0 0 20px rgba(0,212,255,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 60%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(0,212,255,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: drift 12s ease-in-out infinite alternate;
  }

  @keyframes drift {
    from { transform: translate(0, 0); }
    to   { transform: translate(10%, 8%); }
  }

  header {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 720px;
    padding: 48px 24px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: fadeDown 0.6s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: grid;
    place-items: center;
    font-size: 20px;
    box-shadow: 0 0 24px rgba(0,212,255,0.35);
    flex-shrink: 0;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  #users {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s ease-in-out infinite;
    box-shadow: 0 0 8px var(--accent2);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.75); }
  }

  .btn-row {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 24px 24px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  button {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.06em;
    padding: 12px 26px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.08);
    opacity: 0;
    transition: opacity 0.2s;
  }

  button:hover::after { opacity: 1; }
  button:active { transform: scale(0.97); }

  .btn-start {
    background: linear-gradient(135deg, var(--accent), #0099cc);
    color: #000;
    box-shadow: 0 4px 20px rgba(0,212,255,0.3);
  }

  .btn-start:hover {
    box-shadow: 0 6px 28px rgba(0,212,255,0.5);
    transform: translateY(-1px);
  }

  .btn-next {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-next:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: var(--glow);
    transform: translateY(-1px);
  }

  #chat {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 720px;
    padding: 0 24px 40px;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .chat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 48px rgba(0,0,0,0.5), var(--glow);
  }

  .chat-header-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .bar-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .bar-dot:nth-child(1) { background: #ff5f57; }
  .bar-dot:nth-child(2) { background: #febc2e; }
  .bar-dot:nth-child(3) { background: #28c840; }

  .chat-label {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  #messages {
    height: 340px;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.55;
    animation: msgIn 0.2s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-self {
    align-self: flex-end;
    background: linear-gradient(135deg, rgba(0,212,255,0.18), rgba(0,212,255,0.08));
    border: 1px solid rgba(0,212,255,0.2);
    color: var(--text);
    border-bottom-right-radius: 4px;
  }

  .msg-other {
    align-self: flex-start;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .msg-system {
    align-self: center;
    background: transparent;
    color: var(--muted);
    font-size: 11.5px;
    letter-spacing: 0.04em;
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    max-width: 90%;
    text-align: center;
  }

  .input-area {
    display: flex;
    gap: 10px;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    align-items: center;
  }

  #msg {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13.5px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #msg::placeholder { color: var(--muted); }

  #msg:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
  }

  .btn-send {
    background: linear-gradient(135deg, var(--accent), #0099cc);
    color: #000;
    font-weight: 700;
    padding: 12px 22px;
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,212,255,0.25);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn-send:hover {
    box-shadow: 0 4px 20px rgba(0,212,255,0.45);
    transform: translateY(-1px);
  }
</style>
</head>
<body>

<header>
  <div class="logo-row">
    <div class="logo-icon">💬</div>
    <h1>Random Text Chat</h1>
  </div>
  <div id="users">
    <span class="dot"></span>
    Online: 0
  </div>
</header>

<div class="btn-row">
  <button class="btn-start" onclick="startChat()">⚡ Start Chat</button>
  <button class="btn-next" onclick="nextUser()">→ Next</button>
</div>

<div id="chat">
  <div class="chat-card">
    <div class="chat-header-bar">
      <span class="bar-dot"></span>
      <span class="bar-dot"></span>
      <span class="bar-dot"></span>
      <span class="chat-label">Live Session</span>
    </div>

    <div id="messages"></div>

    <div class="input-area">
      <input id="msg" placeholder="Type message...">
      <button class="btn-send" onclick="sendMessage()">Send ↑</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>
</body>
</html>
