<!DOCTYPE html>
<html>
<head>
<title>Random Video Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
padding:20px;
font-size:24px;
}

#users{
color:#4ade80;
}

#videos{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

video{
width:320px;
height:240px;
background:black;
border-radius:10px;
}

.controls{
margin-top:20px;
}

button{
padding:12px 20px;
margin:5px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#chat{
width:60%;
margin:auto;
margin-top:20px;
}

#messages{
height:150px;
overflow:auto;
border:1px solid #333;
padding:10px;
border-radius:8px;
}

input{
width:70%;
padding:10px;
border-radius:8px;
border:none;
}

</style>

</head>

<body>

<header>
Random Chat  
<div id="users">Online: 0</div>
</header>

<div class="controls">
<button onclick="startText()">Text Chat</button>
<button onclick="startVideo()">Video Chat</button>
<button onclick="nextUser()">Next</button>
</div>

<div id="videos">
<video id="localVideo" autoplay muted playsinline></video>
<video id="remoteVideo" autoplay playsinline></video>
</div>

<div id="chat">
<div id="messages"></div>
<br>
<input id="msg">
<button onclick="sendMessage()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
