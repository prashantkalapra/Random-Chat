<!DOCTYPE html>
<html>
<head>
<title>Random Chat</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

#videos{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

video{
width:300px;
height:220px;
background:black;
}

#messages{
height:200px;
overflow:auto;
border:1px solid white;
margin:20px;
padding:10px;
}

button{
padding:10px 20px;
margin:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>Random Chat</h1>

<button onclick="startText()">Text Chat</button>
<button onclick="startVideo()">Video Chat</button>
<button onclick="nextUser()">Next</button>

<div id="videos">

<video id="localVideo" autoplay muted playsinline></video>
<video id="remoteVideo" autoplay playsinline></video>

</div>

<div id="messages"></div>

<input id="messageInput" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
