<!DOCTYPE html>
<html>
<head>

<title>Random Text Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

header{
padding:20px;
font-size:26px;
}

#users{
color:#4ade80;
margin-top:5px;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#1d4ed8;
}

#chat{
width:60%;
margin:auto;
margin-top:20px;
}

#messages{
height:300px;
overflow:auto;
border:1px solid #333;
padding:10px;
border-radius:8px;
text-align:left;
}

input{
width:70%;
padding:10px;
border-radius:8px;
border:none;
margin-top:10px;
}

</style>

</head>

<body>

<header>
Random Text Chat
<div id="users">Online: 0</div>
</header>

<button onclick="startChat()">Start Chat</button>
<button onclick="nextUser()">Next</button>

<div id="chat">

<div id="messages"></div>

<br>

<input id="msg" placeholder="Type message...">
<button onclick="sendMessage()">Send</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
